function switchTab(tab){
  state.currentTab=tab;
  ["bankroll","distribution","survival","stats","team","live"].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle("active",t===tab);
    document.getElementById(`view-${t}`).style.display=t===tab&&state.results?"block":"none";
  });
  if(tab!=="live") stopLive();
  if(state.results) renderCurrentTab();
}

function renderCurrentTab(){
  if(!state.results) return;
  switch(state.currentTab){
    case "bankroll": renderBankroll(); break;
    case "distribution": renderDistribution(); break;
    case "survival": renderSurvival(); break;
    case "stats": renderStats(); break;
    case "team": renderTeam(); break;
    case "live": renderLive(); break;
  }
}

// ── Bankroll Chart (D3): MEDIAN line + p5/p95 percentile band ──
// Shows the typical bankroll trajectory (median, NOT mean) along with the
// 5th/95th percentile bands so heavy-tailed distributions don't visually mislead.
function renderBankroll(){
  const container=document.getElementById("view-bankroll");
  container.innerHTML="";
  const wrap=document.createElement("div");
  wrap.className="chart-container";
  container.appendChild(wrap);

  const headerEl=document.createElement("div");
  headerEl.className="chart-header";
  headerEl.innerHTML=`<span class="chart-label">BANKROLL OVER TIME</span><span class="chart-label">${state.sim.sims>1?"MEDIAN + P5/P95 BAND":"SINGLE RUN"}</span>`;
  wrap.appendChild(headerEl);

  const margin={top:20,right:30,bottom:40,left:65};
  const width=wrap.clientWidth-margin.left-margin.right-40;
  const height=380;

  const svg=d3.select(wrap).append("svg")
    .attr("width",width+margin.left+margin.right)
    .attr("height",height+margin.top+margin.bottom)
    .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  const keys=[...state.activeStrategies];
  if(!keys.length || !state.results[keys[0]]) return;

  // Domain across all strategies
  let yMin=Infinity, yMax=-Infinity, xMax=0;
  for(const sKey of keys){
    const c=state.results[sKey].summary.curves;
    for(const pt of c){
      yMin=Math.min(yMin, pt.p5);
      yMax=Math.max(yMax, pt.p95);
      xMax=Math.max(xMax, pt.hand);
    }
  }
  const x=d3.scaleLinear().domain([0,xMax]).range([0,width]);
  const y=d3.scaleLinear().domain([Math.max(0,yMin*0.9), yMax*1.05]).range([height,0]);

  svg.append("g").attr("class","grid").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).tickSize(-height).tickFormat(""));
  svg.append("g").attr("class","grid").call(d3.axisLeft(y).tickSize(-width).tickFormat(""));
  svg.append("g").attr("class","axis").attr("transform",`translate(0,${height})`)
    .call(d3.axisBottom(x).ticks(8).tickFormat(v=>v>=1000?`${(v/1000).toFixed(0)}k`:v));
  svg.append("g").attr("class","axis")
    .call(d3.axisLeft(y).ticks(6).tickFormat(v=>v>=10000?`$${(v/1000).toFixed(0)}k`:`$${v.toLocaleString()}`));

  // Reference line at starting bankroll
  svg.append("line").attr("x1",0).attr("x2",width)
    .attr("y1",y(state.sim.bankroll)).attr("y2",y(state.sim.bankroll))
    .attr("stroke","#d4a843").attr("stroke-dasharray","6,4").attr("stroke-width",1).attr("opacity",0.45);

  // Bands + median lines
  for(const sKey of keys){
    const col=STRATEGIES[sKey].color;
    const c=state.results[sKey].summary.curves;
    if(state.sim.sims>1){
      const area=d3.area().x(d=>x(d.hand)).y0(d=>y(d.p5)).y1(d=>y(d.p95)).curve(d3.curveMonotoneX);
      svg.append("path").datum(c).attr("d",area).attr("fill",col).attr("opacity",0.12);
    }
    const line=d3.line().x(d=>x(d.hand)).y(d=>y(d.median)).curve(d3.curveMonotoneX);
    const path=svg.append("path").datum(c).attr("d",line).attr("fill","none").attr("stroke",col).attr("stroke-width",2.5);
    const totalLen=path.node().getTotalLength();
    path.attr("stroke-dasharray",totalLen).attr("stroke-dashoffset",totalLen)
      .transition().duration(1200).ease(d3.easeCubicOut).attr("stroke-dashoffset",0);
  }

  // Tooltip
  const tooltip=document.getElementById("tooltip");
  const bisect=d3.bisector(d=>d.hand).left;
  svg.append("rect").attr("width",width).attr("height",height).attr("fill","transparent")
    .on("mousemove",function(event){
      const [mx]=d3.pointer(event);
      const xVal=x.invert(mx);
      let html=`<div style="color:#888;margin-bottom:4px;">Hand ${Math.round(xVal).toLocaleString()}</div>`;
      for(const sKey of keys){
        const c=state.results[sKey].summary.curves;
        const i=bisect(c,xVal,1);
        const d=c[i]||c[c.length-1];
        html+=`<div style="color:${STRATEGIES[sKey].color}">${STRATEGIES[sKey].name}: <b>$${Math.round(d.median).toLocaleString()}</b> <span style="color:#666">(p5 $${Math.round(d.p5).toLocaleString()} – p95 $${Math.round(d.p95).toLocaleString()})</span></div>`;
      }
      tooltip.innerHTML=html;
      tooltip.style.opacity=1;
      tooltip.style.left=event.pageX+12+"px";
      tooltip.style.top=event.pageY-20+"px";
    })
    .on("mouseleave",()=>{tooltip.style.opacity=0;});

  const legend=document.createElement("div");
  legend.className="legend";
  for(const sKey of keys){
    legend.innerHTML+=`<div class="legend-item"><div class="legend-swatch" style="background:${STRATEGIES[sKey].color}"></div>${STRATEGIES[sKey].name}</div>`;
  }
  legend.innerHTML+=`<div class="legend-item" style="color:#888"><div class="legend-swatch" style="background:#888;opacity:0.3"></div>P5–P95 band</div>`;
  wrap.appendChild(legend);
}

// ── Distribution Histogram ──
function renderDistribution(){
  const container=document.getElementById("view-distribution");
  container.innerHTML="";
  const wrap=document.createElement("div");
  wrap.className="chart-container";
  container.appendChild(wrap);

  const keys=[...state.activeStrategies];
  let selKey=keys[0];

  const headerEl=document.createElement("div");
  headerEl.className="chart-header";
  const lblEl=document.createElement("span");
  lblEl.className="chart-label";
  lblEl.textContent="FINAL BANKROLL DISTRIBUTION";
  headerEl.appendChild(lblEl);
  const btnsEl=document.createElement("div");
  btnsEl.className="dist-buttons";
  headerEl.appendChild(btnsEl);
  wrap.appendChild(headerEl);

  const chartArea=document.createElement("div");
  chartArea.id="dist-chart-area";
  wrap.appendChild(chartArea);

  function renderBars(sKey){
    selKey=sKey;
    btnsEl.innerHTML="";
    for(const k of keys){
      const b=document.createElement("button");
      b.className="dist-btn"+(k===sKey?" active":"");
      b.style.borderColor=k===sKey?STRATEGIES[k].color:"";
      b.style.color=k===sKey?STRATEGIES[k].color:"";
      b.textContent=STRATEGIES[k].name;
      b.onclick=()=>renderBars(k);
      btnsEl.appendChild(b);
    }
    chartArea.innerHTML="";

    const runs=state.results[sKey].sims;
    const finals=runs.map(r=>r.final_bankroll);
    const min=Math.min(...finals),max=Math.max(...finals);
    const range=max-min||1;
    const numBins=Math.min(30,Math.max(10,Math.floor(runs.length/2)));
    const binW=range/numBins;
    const bins=Array.from({length:numBins},(_,i)=>({
      x0:min+i*binW,x1:min+(i+1)*binW,count:0,profit:(min+i*binW+binW/2)>=state.sim.bankroll
    }));
    for(const f of finals){const idx=Math.min(Math.floor((f-min)/binW),numBins-1);bins[idx].count++;}

    const margin={top:20,right:30,bottom:40,left:50};
    const width=chartArea.clientWidth||wrap.clientWidth-40;
    const w=width-margin.left-margin.right;
    const h=300;

    const svg=d3.select(chartArea).append("svg").attr("width",w+margin.left+margin.right).attr("height",h+margin.top+margin.bottom)
      .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

    const x=d3.scaleBand().domain(bins.map((_,i)=>i)).range([0,w]).padding(0.15);
    const yMax=d3.max(bins,d=>d.count);
    const y=d3.scaleLinear().domain([0,yMax]).range([h,0]);

    svg.append("g").attr("class","grid").call(d3.axisLeft(y).tickSize(-w).tickFormat(""));
    svg.append("g").attr("class","axis").attr("transform",`translate(0,${h})`)
      .call(d3.axisBottom(x).tickValues(bins.map((_,i)=>i).filter((_,i)=>i%(Math.ceil(numBins/8))===0))
        .tickFormat(i=>`$${Math.round(bins[i].x0).toLocaleString()}`));
    svg.append("g").attr("class","axis").call(d3.axisLeft(y).ticks(5));

    const col=STRATEGIES[sKey].color;
    svg.selectAll(".bar").data(bins).enter().append("rect")
      .attr("x",(_,i)=>x(i)).attr("width",x.bandwidth())
      .attr("y",h).attr("height",0)
      .attr("rx",3)
      .attr("fill",d=>d.profit?col:"#ef535088")
      .transition().duration(600).ease(d3.easeCubicOut)
      .attr("y",d=>y(d.count)).attr("height",d=>h-y(d.count));

    // Legend
    const leg=document.createElement("div");
    leg.style.cssText="text-align:center;margin-top:10px;font:11px var(--font-mono);color:#555";
    leg.innerHTML=`<span style="color:#ef5350">■</span> Loss &nbsp;&nbsp; <span style="color:${col}">■</span> Profit`;
    chartArea.appendChild(leg);
  }

  renderBars(selKey);
}

// ── Survival & Profit-Probability Curves ──
// Two stacked time-series. Survival = % of sims still alive at hand h.
// Profit-prob = % of sims with bankroll > start at hand h. Together they tell
// a much more honest story than ROI for high-risk progression strategies:
// e.g. Oscar's Grind grinds up to a small profit *most* of the time, but a
// chunk of runs vaporise the bankroll long before the end of the session.
function renderSurvival(){
  const container=document.getElementById("view-survival");
  container.innerHTML="";

  const keys=[...state.activeStrategies];
  if(!keys.length) return;

  function makeChart(metric, title, axisLabel){
    const wrap=document.createElement("div");
    wrap.className="chart-container";
    wrap.style.marginBottom="14px";
    wrap.innerHTML=`<div class="chart-header"><span class="chart-label">${title}</span><span class="chart-label">% OF SIMULATIONS</span></div>`;
    container.appendChild(wrap);

    const margin={top:20,right:30,bottom:40,left:60};
    const width=wrap.clientWidth-margin.left-margin.right-40;
    const height=260;

    const svg=d3.select(wrap).append("svg")
      .attr("width",width+margin.left+margin.right)
      .attr("height",height+margin.top+margin.bottom)
      .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

    let xMax=0;
    for(const sKey of keys){
      const c=state.results[sKey].summary.curves;
      xMax=Math.max(xMax, c[c.length-1].hand);
    }
    const x=d3.scaleLinear().domain([0,xMax]).range([0,width]);
    const y=d3.scaleLinear().domain([0,100]).range([height,0]);

    svg.append("g").attr("class","grid").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).tickSize(-height).tickFormat(""));
    svg.append("g").attr("class","grid").call(d3.axisLeft(y).tickSize(-width).tickFormat(""));
    svg.append("g").attr("class","axis").attr("transform",`translate(0,${height})`)
      .call(d3.axisBottom(x).ticks(8).tickFormat(v=>v>=1000?`${(v/1000).toFixed(0)}k`:v));
    svg.append("g").attr("class","axis").call(d3.axisLeft(y).ticks(5).tickFormat(v=>v+"%"));

    // 50% reference line (only meaningful for profit chance)
    if(metric==="profit_chance_pct"){
      svg.append("line").attr("x1",0).attr("x2",width).attr("y1",y(50)).attr("y2",y(50))
        .attr("stroke","#d4a843").attr("stroke-dasharray","6,4").attr("opacity",0.4);
    }

    for(const sKey of keys){
      const c=state.results[sKey].summary.curves;
      const col=STRATEGIES[sKey].color;
      const line=d3.line().x(d=>x(d.hand)).y(d=>y(d[metric])).curve(d3.curveMonotoneX);
      const path=svg.append("path").datum(c).attr("d",line).attr("fill","none").attr("stroke",col).attr("stroke-width",2.5);
      const tl=path.node().getTotalLength();
      path.attr("stroke-dasharray",tl).attr("stroke-dashoffset",tl)
        .transition().duration(1100).ease(d3.easeCubicOut).attr("stroke-dashoffset",0);
    }

    const tooltip=document.getElementById("tooltip");
    const bisect=d3.bisector(d=>d.hand).left;
    svg.append("rect").attr("width",width).attr("height",height).attr("fill","transparent")
      .on("mousemove",function(event){
        const [mx]=d3.pointer(event);
        const xv=x.invert(mx);
        let html=`<div style="color:#888;margin-bottom:4px;">Hand ${Math.round(xv).toLocaleString()}</div>`;
        for(const sKey of keys){
          const c=state.results[sKey].summary.curves;
          const i=bisect(c,xv,1);
          const d=c[i]||c[c.length-1];
          html+=`<div style="color:${STRATEGIES[sKey].color}">${STRATEGIES[sKey].name}: <b>${d[metric].toFixed(1)}%</b></div>`;
        }
        tooltip.innerHTML=html;
        tooltip.style.opacity=1;
        tooltip.style.left=event.pageX+12+"px";
        tooltip.style.top=event.pageY-20+"px";
      })
      .on("mouseleave",()=>{tooltip.style.opacity=0;});

    const legend=document.createElement("div");
    legend.className="legend";
    for(const sKey of keys){
      legend.innerHTML+=`<div class="legend-item"><div class="legend-swatch" style="background:${STRATEGIES[sKey].color}"></div>${STRATEGIES[sKey].name}</div>`;
    }
    wrap.appendChild(legend);
  }

  makeChart("survival_pct", "SURVIVAL CURVE — % OF SIMS STILL ALIVE", "Survival %");
  makeChart("profit_chance_pct", "PROFIT PROBABILITY — % WITH BANKROLL > START", "Profit %");
}

// ── Stats Table ──
// Survival-first ranking. Mean/ROI is intentionally NOT the primary signal —
// median, profit chance, and ruin rate matter more for distributions with
// fat right-tails (Martingale, Oscar's Grind etc.) where a few outlier wins
// can drag the mean above zero while >90% of runs ended ruined.
function renderStats(){
  const container=document.getElementById("view-stats");
  container.innerHTML="";
  const wrap=document.createElement("div");
  wrap.className="chart-container";
  container.appendChild(wrap);

  const lbl=document.createElement("span");
  lbl.className="chart-label";
  lbl.textContent="STRATEGY COMPARISON — RANKED BY PROFIT CHANCE";
  wrap.appendChild(lbl);

  const fmtK=v=>{
    const sgn=v<0?"-":""; const a=Math.abs(v);
    return sgn+(a>=10000?`$${(a/1000).toFixed(0)}k`:`$${Math.round(a).toLocaleString()}`);
  };
  const colorFor=status=>status==="green"?"#66bb6a":status==="red"?"#ef5350":"#ffa726";
  const tagBadge=tag=>{
    const map={
      "Low survival":      {bg:"rgba(239,83,80,0.18)", fg:"#ef5350"},
      "Outlier-driven":    {bg:"rgba(255,167,38,0.18)", fg:"#ffa726"},
      "High volatility":   {bg:"rgba(255,167,38,0.18)", fg:"#ffa726"},
      "Stable loser":      {bg:"rgba(239,83,80,0.12)", fg:"#ef5350"},
      "Stable winner":     {bg:"rgba(102,187,106,0.18)", fg:"#66bb6a"},
      "Cheating / invalid":{bg:"rgba(255,213,79,0.18)", fg:"#ffd54f"},
    };
    const c=map[tag]||{bg:"#222", fg:"#888"};
    return `<span style="display:inline-block;background:${c.bg};color:${c.fg};padding:2px 7px;border-radius:3px;font:600 9.5px var(--font-mono);letter-spacing:0.5px;margin:1px 2px 1px 0">${tag.toUpperCase()}</span>`;
  };
  // Tooltip helper — uses native title="" attribute so no extra JS plumbing.
  const tip=text=>`title="${text.replace(/"/g,"&quot;")}"`;

  // Sort by profit_chance_pct descending so the safest-by-profit-chance
  // strategy is on top. Ruin / median / volatility break ties.
  const sortedKeys=[...state.activeStrategies].sort((a,b)=>{
    const sa=state.results[a]?.summary, sb=state.results[b]?.summary;
    if(!sa) return 1; if(!sb) return -1;
    return (sb.profit_chance_pct||0) - (sa.profit_chance_pct||0);
  });

  let html=`<table class="stats-table"><thead><tr>
    <th>Strategy</th>
    <th ${tip("Percent of simulations that finished above the starting bankroll. The headline 'did I win money?' metric.")}>Profit %</th>
    <th ${tip("Percent of simulations where the player could no longer place a legal bet (bankroll < table min, or the strategy demanded more than the table max, or more than the bankroll could cover).")}>Ruin %</th>
    <th ${tip("Final bankroll of the median (50th percentile) simulation. More robust than the mean for heavy-tailed payoff distributions.")}>Median</th>
    <th>Mean</th>
    <th ${tip("Average profit per hand actually played, across all simulations. Negative means the strategy bleeds money on every hand on average.")}>EV/Hand</th>
    <th>Std Dev</th>
    <th>Min</th><th>Max</th>
    <th ${tip("Maximum drawdown — largest % decline from a running peak bankroll, averaged across sims. Always 0–100%.")}>Max DD</th>
    <th>Status</th>
  </tr></thead><tbody>`;
  for(const sKey of sortedKeys){
    const d=state.results[sKey]; if(!d) continue;
    const s=d.summary, m=d.meta;
    const profitColor=colorFor(s.color_status);
    const ruinColor=s.ruin_rate>=0.25?"var(--red)":s.ruin_rate>=0.10?"#ffa726":"var(--green)";
    const medColor=s.median>state.sim.bankroll?"var(--green)":"var(--red)";
    const meanRoiSuffix=`<span style="font-size:10px;color:#666">(${s.roi>0?"+":""}${s.roi}%)</span>`;
    const tagsHTML=(s.tags||[]).map(tagBadge).join(" ");
    const warningHTML=s.warning?`<div style="font:600 10px var(--font-mono);color:#ffa726;margin-top:3px">⚠ ${s.warning}</div>`:"";
    html+=`<tr style="border-left:3px solid ${profitColor}">
      <td>
        <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${m.color};margin-right:8px;vertical-align:middle"></span>${m.name}
        <div style="margin-top:6px">${tagsHTML}</div>${warningHTML}
      </td>
      <td style="color:${profitColor};font-weight:700">${(s.profit_chance_pct||0).toFixed(1)}%</td>
      <td style="color:${ruinColor};font-weight:700">${(s.ruin_rate*100).toFixed(1)}%</td>
      <td style="color:${medColor};font-weight:700">${fmtK(s.median)}</td>
      <td>${fmtK(s.mean)} ${meanRoiSuffix}</td>
      <td style="color:${(s.ev_per_hand||0)>=0?"var(--green)":"var(--red)"}">${(s.ev_per_hand||0)>=0?"+":""}$${(s.ev_per_hand||0).toFixed(3)}</td>
      <td>${fmtK(s.std)}</td>
      <td style="color:#ef535088">${fmtK(s.min)}</td>
      <td style="color:#66bb6a88">${fmtK(s.max)}</td>
      <td style="color:#ffa726">${(s.avg_max_drawdown*100).toFixed(1)}%</td>
      <td><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${profitColor};box-shadow:0 0 8px ${profitColor}66"></span></td>
    </tr>`;
    // MIT team — render an inline per-role mini-row underneath.
    if(sKey==="mit_team" && s.team_breakdown){
      const tb=s.team_breakdown;
      const startThird=state.sim.bankroll/3;
      const cell=role=>{
        const m2=MIT_ROLE_META[role];
        const v=tb[role].mean;
        const pl=v-startThird;
        const c=pl>=0?"var(--green)":"var(--red)";
        return `<span style="color:${m2.color};font-weight:700">${m2.label}</span> ${fmtK(v)} <span style="color:${c};font-size:10px">(${pl>=0?"+":""}${fmtK(pl)})</span>`;
      };
      html+=`<tr><td colspan="11" style="padding:4px 10px 14px;font:11px var(--font-mono);color:#777;border-bottom:1px solid var(--border)">
        ↳ ${cell("spotter")} &nbsp;·&nbsp; ${cell("controller")} &nbsp;·&nbsp; ${cell("big_player")} &nbsp;·&nbsp;
        BP play rate: <span style="color:${MIT_ROLE_META.big_player.color};font-weight:700">${((s.avg_bp_play_rate||0)*100).toFixed(1)}%</span>
      </td></tr>`;
    }
  }
  html+=`</tbody></table>`;

  // Risk-control summary banner (if SL/TP were applied)
  let banner="";
  const sl=state.risk.stopLossPct, tp=state.risk.takeProfitPct;
  if(sl!=null || tp!=null){
    banner=`<div style="margin-top:14px;padding:10px 14px;background:var(--bg-elevated);border-left:3px solid #d4a843;font:12px var(--font-mono);color:#aaa">
      Risk controls active:
      ${sl!=null?`<span style="color:#ef5350">stop-loss at -${sl}%</span>`:""}
      ${(sl!=null && tp!=null)?" · ":""}
      ${tp!=null?`<span style="color:#66bb6a">take-profit at +${tp}%</span>`:""}
    </div>`;
  }

  // Color legend
  const legend=`<div style="margin-top:14px;font:11px var(--font-mono);color:#888;line-height:1.7">
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#66bb6a;vertical-align:middle;margin-right:6px"></span>Green: profit chance &gt; 50%, median &gt; start, ruin &lt; 10% &nbsp;·&nbsp;
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ffa726;vertical-align:middle;margin-right:6px"></span>Amber: mixed signals &nbsp;·&nbsp;
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ef5350;vertical-align:middle;margin-right:6px"></span>Red: ruin ≥ 25% OR median ≤ start OR drawdown ≥ 75%
  </div>`;

  wrap.innerHTML+=html+banner+legend;
}

// ══════════════════════════════════════════════════════════════════════════════
// MIT TEAM BREAKDOWN
// ══════════════════════════════════════════════════════════════════════════════
// Shows the per-actor P/L of the Spotter, Controller, and Big Player along
// with their collated team total. Only meaningful when the MIT team strategy
// is included in the simulation run.

function renderTeam(){
  const container=document.getElementById("view-team");
  container.innerHTML="";

  const data=state.results?.mit_team;
  if(!data){
    container.innerHTML=`
      <div class="empty-state">
        <div class="suits">♠ ♥ ♦ ♣</div>
        <p>Enable the <b style="color:${MIT_ROLE_META.combined.color}">MIT Team</b> strategy in the sidebar and run a simulation to see the per-actor breakdown.</p>
      </div>`;
    return;
  }

  // ── Top wrapper: per-role bankroll over time chart ──
  const wrap=document.createElement("div");
  wrap.className="chart-container";
  wrap.innerHTML=`
    <div class="chart-header">
      <span class="chart-label">TEAM P/L OVER TIME</span>
      <span class="chart-label">${state.sim.sims>1?"FIRST RUN (per-actor lines)":"SINGLE RUN"}</span>
    </div>`;
  container.appendChild(wrap);

  // Use the first simulation's history for per-role traces
  // (they're per-run so we don't average them — averaging would smear the
  // dramatic Big-Player swings flat).
  const series=data.sims[0].history;
  if(!series || series.length===0){
    wrap.innerHTML+=`<p style="color:#888;font:12px var(--font-mono);padding:20px">No team history available.</p>`;
  } else {
    const margin={top:20,right:30,bottom:40,left:70};
    const w=wrap.clientWidth-margin.left-margin.right-40;
    const h=380;

    const svg=d3.select(wrap).append("svg")
      .attr("width",w+margin.left+margin.right)
      .attr("height",h+margin.top+margin.bottom)
      .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

    const roles=["spotter","controller","big_player"];
    let yMin=Infinity, yMax=-Infinity;
    for(const pt of series){
      yMin=Math.min(yMin, pt.spotter, pt.controller, pt.big_player, pt.bankroll);
      yMax=Math.max(yMax, pt.spotter, pt.controller, pt.big_player, pt.bankroll);
    }

    const x=d3.scaleLinear().domain([0, series[series.length-1].hand]).range([0,w]);
    const y=d3.scaleLinear().domain([Math.min(0, yMin*0.9), yMax*1.05]).range([h,0]);

    // Grid + axes
    svg.append("g").attr("class","grid").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x).tickSize(-h).tickFormat(""));
    svg.append("g").attr("class","grid").call(d3.axisLeft(y).tickSize(-w).tickFormat(""));
    svg.append("g").attr("class","axis").attr("transform",`translate(0,${h})`)
      .call(d3.axisBottom(x).ticks(8).tickFormat(v=>v>=1000?`${(v/1000).toFixed(0)}k`:v));
    svg.append("g").attr("class","axis")
      .call(d3.axisLeft(y).ticks(7).tickFormat(v=>v>=10000?`$${(v/1000).toFixed(0)}k`:`$${Math.round(v).toLocaleString()}`));

    // Reference line at starting per-role bankroll = startB/3
    const startThird=state.sim.bankroll/3;
    svg.append("line").attr("x1",0).attr("x2",w).attr("y1",y(startThird)).attr("y2",y(startThird))
      .attr("stroke","#888").attr("stroke-dasharray","4,4").attr("opacity",0.35);
    // Reference line for whole-team starting bankroll
    svg.append("line").attr("x1",0).attr("x2",w).attr("y1",y(state.sim.bankroll)).attr("y2",y(state.sim.bankroll))
      .attr("stroke",MIT_ROLE_META.combined.color).attr("stroke-dasharray","6,4").attr("opacity",0.4);

    // Per-role lines
    for(const role of roles){
      const col=MIT_ROLE_META[role].color;
      const line=d3.line().x(d=>x(d.hand)).y(d=>y(d[role])).curve(d3.curveMonotoneX);
      const path=svg.append("path").datum(series).attr("d",line).attr("fill","none").attr("stroke",col).attr("stroke-width",2);
      const tl=path.node().getTotalLength();
      path.attr("stroke-dasharray",tl).attr("stroke-dashoffset",tl)
        .transition().duration(1100).ease(d3.easeCubicOut).attr("stroke-dashoffset",0);
    }
    // Combined line — thicker, sits on top
    const combinedLine=d3.line().x(d=>x(d.hand)).y(d=>y(d.bankroll)).curve(d3.curveMonotoneX);
    const cp=svg.append("path").datum(series).attr("d",combinedLine).attr("fill","none")
      .attr("stroke",MIT_ROLE_META.combined.color).attr("stroke-width",3.2);
    const cl=cp.node().getTotalLength();
    cp.attr("stroke-dasharray",cl).attr("stroke-dashoffset",cl)
      .transition().duration(1400).ease(d3.easeCubicOut).attr("stroke-dashoffset",0);

    // Hover overlay
    const tooltip=document.getElementById("tooltip");
    const bisect=d3.bisector(d=>d.hand).left;
    svg.append("rect").attr("width",w).attr("height",h).attr("fill","transparent")
      .on("mousemove",function(event){
        const [mx]=d3.pointer(event);
        const xv=x.invert(mx);
        const i=bisect(series,xv,1);
        const d=series[i]||series[series.length-1];
        let html=`<div style="color:#888;margin-bottom:4px;">Hand ${d.hand.toLocaleString()}</div>`;
        for(const role of roles){
          const m=MIT_ROLE_META[role];
          html+=`<div style="color:${m.color}">${m.label}: $${Math.round(d[role]).toLocaleString()}</div>`;
        }
        html+=`<div style="color:${MIT_ROLE_META.combined.color};margin-top:4px;border-top:1px solid #333;padding-top:4px">TEAM: $${Math.round(d.bankroll).toLocaleString()}</div>`;
        tooltip.innerHTML=html;
        tooltip.style.opacity=1;
        tooltip.style.left=event.pageX+12+"px";
        tooltip.style.top=event.pageY-20+"px";
      })
      .on("mouseleave",()=>{tooltip.style.opacity=0;});

    // Legend
    const legend=document.createElement("div");
    legend.className="legend";
    for(const role of roles){
      const m=MIT_ROLE_META[role];
      legend.innerHTML+=`<div class="legend-item"><div class="legend-swatch" style="background:${m.color}"></div>${m.label}</div>`;
    }
    legend.innerHTML+=`<div class="legend-item"><div class="legend-swatch" style="background:${MIT_ROLE_META.combined.color};height:5px"></div><b style="color:${MIT_ROLE_META.combined.color}">${MIT_ROLE_META.combined.label}</b></div>`;
    wrap.appendChild(legend);
  }

  // ── KPI row: per-actor finals (averaged across all sims) ──
  const tb=data.summary.team_breakdown;
  const startThird=state.sim.bankroll/3;
  const kpiWrap=document.createElement("div");
  kpiWrap.className="chart-container";
  kpiWrap.style.marginTop="16px";
  kpiWrap.innerHTML=`<div class="chart-header"><span class="chart-label">AVERAGE FINAL POSITION (across ${data.sims.length} simulations)</span></div>`;
  const grid=document.createElement("div");
  grid.style.cssText="display:grid;grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));gap:12px;margin-top:10px;";
  const fmt=v=>(v>=10000?`$${(v/1000).toFixed(1)}k`:`$${Math.round(v).toLocaleString()}`);
  for(const role of ["spotter","controller","big_player"]){
    const m=MIT_ROLE_META[role];
    const final=tb[role].mean;
    const pl=final-startThird;
    const plPct=startThird>0?(pl/startThird*100):0;
    const plCol=pl>=0?"#66bb6a":"#ef5350";
    grid.innerHTML+=`
      <div style="background:var(--bg-elevated);border-radius:8px;padding:14px;border-left:4px solid ${m.color}">
        <div style="font:400 11px var(--font-mono);color:${m.color};letter-spacing:1px;text-transform:uppercase">${m.label}</div>
        <div style="font:700 22px var(--font-mono);color:var(--text-primary);margin-top:6px">${fmt(final)}</div>
        <div style="font:11px var(--font-mono);color:${plCol};margin-top:2px">${pl>=0?"+":""}${fmt(pl)} (${pl>=0?"+":""}${plPct.toFixed(1)}%)</div>
        <div style="font:300 10px var(--font-sans);color:#666;margin-top:4px">range: ${fmt(tb[role].min)} → ${fmt(tb[role].max)}</div>
      </div>`;
  }
  // Combined card
  const final=data.summary.mean;
  const pl=final-state.sim.bankroll;
  const plCol=pl>=0?"#66bb6a":"#ef5350";
  grid.innerHTML+=`
    <div style="background:linear-gradient(135deg, rgba(255,213,79,0.12), rgba(212,168,67,0.04));border-radius:8px;padding:14px;border-left:4px solid ${MIT_ROLE_META.combined.color}">
      <div style="font:700 11px var(--font-mono);color:${MIT_ROLE_META.combined.color};letter-spacing:1px;text-transform:uppercase">Team Total</div>
      <div style="font:700 22px var(--font-mono);color:${MIT_ROLE_META.combined.color};margin-top:6px">${fmt(final)}</div>
      <div style="font:11px var(--font-mono);color:${plCol};margin-top:2px">${pl>=0?"+":""}${fmt(pl)} (${data.summary.roi>=0?"+":""}${data.summary.roi}%)</div>
      <div style="font:300 10px var(--font-sans);color:#666;margin-top:4px">collated winnings of all 3 roles</div>
    </div>`;
  kpiWrap.appendChild(grid);

  // BP play rate stat
  const bpRate=(data.summary.avg_bp_play_rate||0)*100;
  const meta=document.createElement("div");
  meta.style.cssText="font:11px var(--font-mono);color:#888;margin-top:14px;text-align:center";
  meta.innerHTML=`Big Player engaged on <span style="color:${MIT_ROLE_META.big_player.color};font-weight:700">${bpRate.toFixed(1)}%</span> of rounds (only when true count ≥ +2). Across ${data.sims[0].stats.total_hands} hot-shoe hands his win rate was <span style="color:${MIT_ROLE_META.combined.color};font-weight:700">${(data.sims[0].stats.win_rate*100).toFixed(1)}%</span>.`;
  kpiWrap.appendChild(meta);
  container.appendChild(kpiWrap);

  // ── Distribution of team finals ──
  const distWrap=document.createElement("div");
  distWrap.className="chart-container";
  distWrap.style.marginTop="16px";
  distWrap.innerHTML=`<div class="chart-header"><span class="chart-label">PER-ROLE FINAL DISTRIBUTION (${data.sims.length} sims)</span></div>`;
  container.appendChild(distWrap);

  const dW=distWrap.clientWidth-100;
  const dH=240;
  const dMargin={top:20,right:20,bottom:40,left:60};
  const dSvg=d3.select(distWrap).append("svg")
    .attr("width", dW+dMargin.left+dMargin.right)
    .attr("height", dH+dMargin.top+dMargin.bottom)
    .append("g").attr("transform",`translate(${dMargin.left},${dMargin.top})`);

  const roles=["spotter","controller","big_player"];
  const allFinals=[];
  for(const role of roles){
    for(const s of data.sims) allFinals.push((s.team_breakdown||{})[role]||0);
  }
  const dxMin=Math.min(...allFinals, startThird*0.5);
  const dxMax=Math.max(...allFinals, startThird*1.5);
  const dx=d3.scaleLinear().domain([dxMin, dxMax]).range([0, dW]);
  const dy=d3.scaleBand().domain(roles).range([0, dH]).padding(0.25);

  dSvg.append("g").attr("class","axis").attr("transform",`translate(0,${dH})`)
    .call(d3.axisBottom(dx).ticks(7).tickFormat(v=>v>=10000?`$${(v/1000).toFixed(0)}k`:`$${Math.round(v).toLocaleString()}`));
  dSvg.append("g").attr("class","axis")
    .call(d3.axisLeft(dy).tickFormat(r=>MIT_ROLE_META[r].label));

  // Reference line at starting per-role bankroll
  dSvg.append("line").attr("x1",dx(startThird)).attr("x2",dx(startThird))
    .attr("y1",0).attr("y2",dH).attr("stroke","#888").attr("stroke-dasharray","4,4").attr("opacity",0.5);

  // Strip-plot dots: one per simulation per role.
  for(const role of roles){
    const col=MIT_ROLE_META[role].color;
    const yPos=dy(role)+dy.bandwidth()/2;
    const vals=data.sims.map(s=>(s.team_breakdown||{})[role]||0);
    dSvg.selectAll(`.dot-${role}`).data(vals).enter().append("circle")
      .attr("cx",d=>dx(d))
      .attr("cy",()=>yPos+(Math.random()*dy.bandwidth()*0.5-dy.bandwidth()*0.25))
      .attr("r",4).attr("fill",col).attr("opacity",0.55);
    // Mean marker
    const m=tb[role].mean;
    dSvg.append("line").attr("x1",dx(m)).attr("x2",dx(m))
      .attr("y1",yPos-dy.bandwidth()*0.45).attr("y2",yPos+dy.bandwidth()*0.45)
      .attr("stroke",col).attr("stroke-width",3);
  }
}


// ══════════════════════════════════════════════════════════════════════════════
// LIVE REPLAY MODE
// ══════════════════════════════════════════════════════════════════════════════

function renderLive(){
  const container=document.getElementById("view-live");
  container.innerHTML="";

  const keys=[...state.activeStrategies];
  if(!state.liveState.strategy||!keys.includes(state.liveState.strategy)) state.liveState.strategy=keys[0];
  const sKey=state.liveState.strategy;
  const hands=state.results[sKey]?.live_hands;
  if(!hands||hands.length===0){
    container.innerHTML=`<div class="empty-state"><p>No hand data available for live replay.</p></div>`;
    return;
  }

  // Controls panel
  const panel=document.createElement("div");
  panel.className="live-panel";
  panel.innerHTML=`
    <div class="live-controls">
      <button class="btn" id="live-play">▶ PLAY</button>
      <button class="btn" id="live-pause" style="display:none">❚❚ PAUSE</button>
      <button class="btn" id="live-step">STEP →</button>
      <button class="btn" id="live-reset">⟲ RESET</button>
      <span style="font:11px var(--font-mono);color:#888;margin-left:8px;">SPEED</span>
      <input type="range" class="speed-slider" id="live-speed" min="1" max="200" value="${state.liveState.speed}">
      <span style="font:11px var(--font-mono);color:var(--gold)" id="speed-label">${state.liveState.speed} h/s</span>
      <div style="flex:1"></div>
      <div class="strategy-selector" id="live-strat-btns"></div>
    </div>
    <div class="cards-display" id="live-cards">
      <div class="card-group"><h4>PLAYER</h4><div class="card-row" id="player-cards"></div><div style="font:700 14px var(--font-mono);color:#888;margin-top:4px" id="player-total"></div></div>
      <div class="card-group"><h4>DEALER</h4><div class="card-row" id="dealer-cards"></div><div style="font:700 14px var(--font-mono);color:#888;margin-top:4px" id="dealer-total"></div></div>
      <div style="flex:1;text-align:right;display:flex;flex-direction:column;justify-content:center;" id="hand-result-display"></div>
    </div>
    <div class="live-stats" id="live-stats-grid"></div>
  `;
  container.appendChild(panel);

  // Strategy selector
  const stratBtns=panel.querySelector("#live-strat-btns");
  for(const k of keys){
    const b=document.createElement("button");
    b.className="btn"+(k===sKey?" active":"");
    b.textContent=STRATEGIES[k].name;
    b.style.fontSize="11px"; b.style.padding="4px 10px";
    b.onclick=()=>{
      state.liveState.strategy=k;
      state.liveState.handIdx=0;
      stopLive();
      renderLive();
    };
    stratBtns.appendChild(b);
  }

  // Chart area
  const chartWrap=document.createElement("div");
  chartWrap.className="chart-container";
  chartWrap.style.marginTop="16px";
  chartWrap.innerHTML=`<div class="chart-header"><span class="chart-label">LIVE BANKROLL</span><span class="chart-label" id="live-hand-counter">Hand 0 / ${hands.length}</span></div>`;
  container.appendChild(chartWrap);

  const margin={top:20,right:30,bottom:40,left:65};
  const svgWidth=chartWrap.clientWidth-40;
  const w=svgWidth-margin.left-margin.right;
  const h=300;
  const col=STRATEGIES[sKey].color;

  // Pre-compute y domain from all hands
  const allBR=hands.map(h=>h.bankroll);
  const yMin=Math.max(0,Math.min(...allBR)*0.9);
  const yMax=Math.max(...allBR)*1.05;

  const svg=d3.select(chartWrap).append("svg").attr("width",w+margin.left+margin.right).attr("height",h+margin.top+margin.bottom)
    .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

  const xScale=d3.scaleLinear().domain([0,hands.length]).range([0,w]);
  const yScale=d3.scaleLinear().domain([yMin,yMax]).range([h,0]);

  svg.append("g").attr("class","grid").attr("transform",`translate(0,${h})`).call(d3.axisBottom(xScale).tickSize(-h).tickFormat(""));
  svg.append("g").attr("class","grid").call(d3.axisLeft(yScale).tickSize(-w).tickFormat(""));
  svg.append("g").attr("class","axis").attr("transform",`translate(0,${h})`).call(d3.axisBottom(xScale).ticks(8).tickFormat(v=>v>=1000?`${(v/1000).toFixed(0)}k`:v));
  svg.append("g").attr("class","axis").call(d3.axisLeft(yScale).ticks(6).tickFormat(v=>`$${v>=10000?(v/1000).toFixed(0)+"k":v.toLocaleString()}`));

  // Reference line
  svg.append("line").attr("x1",0).attr("x2",w).attr("y1",yScale(state.sim.bankroll)).attr("y2",yScale(state.sim.bankroll))
    .attr("stroke","#d4a843").attr("stroke-dasharray","6,4").attr("stroke-width",1).attr("opacity",0.3);

  // Live path
  const lineFn=d3.line().x(d=>xScale(d.hand_num)).y(d=>yScale(d.bankroll)).curve(d3.curveMonotoneX);
  const livePath=svg.append("path").attr("fill","none").attr("stroke",col).attr("stroke-width",2.5);
  // Dot
  const dot=svg.append("circle").attr("r",4).attr("fill",col).attr("opacity",0);
  // Win/loss flash
  const flash=svg.append("circle").attr("r",8).attr("fill",col).attr("opacity",0);

  function renderCard(rank){
    const isRed=["♥","♦"].some(s=>rank.includes&&rank.includes(s))||false;
    return `<div class="playing-card${isRed?" red":""}">${rank}</div>`;
  }

  function updateDisplay(idx){
    if(idx<0||idx>=hands.length) return;
    const hand=hands[idx];
    const slice=[{hand_num:0,bankroll:state.sim.bankroll},...hands.slice(0,idx+1)];
    livePath.attr("d",lineFn(slice));
    dot.attr("cx",xScale(hand.hand_num)).attr("cy",yScale(hand.bankroll)).attr("opacity",1);

    // Flash effect
    flash.attr("cx",xScale(hand.hand_num)).attr("cy",yScale(hand.bankroll))
      .attr("fill",hand.net>=0?col:"#ef5350").attr("opacity",0.6)
      .transition().duration(300).attr("opacity",0).attr("r",16)
      .transition().attr("r",8);

    // Cards
    document.getElementById("player-cards").innerHTML=hand.player_cards.map(renderCard).join("");
    document.getElementById("dealer-cards").innerHTML=hand.dealer_cards.map(renderCard).join("");
    document.getElementById("player-total").textContent=hand.player_total||"Split";
    document.getElementById("dealer-total").textContent=hand.dealer_total;

    // Result
    const resEl=document.getElementById("hand-result-display");
    const resColors={win:col,blackjack:"#ffd54f",loss:"#ef5350",push:"#888",scout:"#888",active:col};
    const resLabels={win:"WIN",blackjack:"BLACKJACK!",loss:"LOSS",push:"PUSH",scout:"SCOUTING",active:"PLAYING"};
    resEl.innerHTML=`
      <div style="font:700 20px var(--font-mono);color:${resColors[hand.result]||col}">${resLabels[hand.result]||hand.result.toUpperCase()}</div>
      <div style="font:13px var(--font-mono);color:${hand.net>=0?col:"#ef5350"};margin-top:4px">${hand.net>=0?"+":""}$${hand.net.toLocaleString()}</div>
      <div style="font:11px var(--font-mono);color:#666;margin-top:2px">Bet: $${hand.bet.toLocaleString()}</div>
    `;

    // Stats
    const played=hands.slice(0,idx+1);
    const w=played.filter(h=>h.result==="win"||h.result==="blackjack").length;
    const l=played.filter(h=>h.result==="loss").length;
    const totalNet=played.reduce((a,h)=>a+h.net,0);
    let statsHTML=`
      <div class="live-stat"><div class="val">$${hand.bankroll.toLocaleString()}</div><div class="lbl">BANKROLL</div></div>
      <div class="live-stat"><div class="val">${hand.hand_num}</div><div class="lbl">HAND #</div></div>
      <div class="live-stat"><div class="val" style="color:${totalNet>=0?col:"#ef5350"}">${totalNet>=0?"+":""}$${Math.round(totalNet).toLocaleString()}</div><div class="lbl">NET P&L</div></div>
      <div class="live-stat"><div class="val">${w}</div><div class="lbl">WINS</div></div>
      <div class="live-stat"><div class="val" style="color:#ef5350">${l}</div><div class="lbl">LOSSES</div></div>
      <div class="live-stat"><div class="val">${(w/(w+l||1)*100).toFixed(1)}%</div><div class="lbl">WIN RATE</div></div>
    `;
    if(hand.running_count!==undefined){
      const tcCol=hand.true_count>=2?"#ffd54f":(hand.true_count<=-2?"#ef5350":"var(--text-primary)");
      statsHTML+=`
        <div class="live-stat"><div class="val">${hand.running_count}</div><div class="lbl">RUNNING COUNT</div></div>
        <div class="live-stat"><div class="val" style="color:${tcCol}">${hand.true_count}</div><div class="lbl">TRUE COUNT</div></div>
      `;
    }
    // MIT-team specific extras: which actor is playing, per-role bankrolls.
    if(hand.active_actor){
      const actorMeta=MIT_ROLE_META[hand.active_actor];
      const bpFlag=hand.bp_active?`<span style="color:${MIT_ROLE_META.big_player.color}">● BP IN</span>`:`<span style="color:#666">scout</span>`;
      statsHTML+=`
        <div class="live-stat" style="border-left:3px solid ${actorMeta.color}">
          <div class="val" style="font-size:14px;color:${actorMeta.color}">${actorMeta.label}</div>
          <div class="lbl">ACTING ROLE • ${bpFlag}</div>
        </div>
        <div class="live-stat"><div class="val" style="font-size:14px;color:${MIT_ROLE_META.spotter.color}">$${Math.round(hand.spotter_br).toLocaleString()}</div><div class="lbl">SPOTTER BR</div></div>
        <div class="live-stat"><div class="val" style="font-size:14px;color:${MIT_ROLE_META.controller.color}">$${Math.round(hand.controller_br).toLocaleString()}</div><div class="lbl">CONTROLLER BR</div></div>
        <div class="live-stat"><div class="val" style="font-size:14px;color:${MIT_ROLE_META.big_player.color}">$${Math.round(hand.big_player_br).toLocaleString()}</div><div class="lbl">BIG PLAYER BR</div></div>
      `;
    }
    document.getElementById("live-stats-grid").innerHTML=statsHTML;
    document.getElementById("live-hand-counter").textContent=`Hand ${hand.hand_num} / ${hands.length}`;
  }

  // Controls
  const playBtn=document.getElementById("live-play");
  const pauseBtn=document.getElementById("live-pause");
  const stepBtn=document.getElementById("live-step");
  const resetBtn=document.getElementById("live-reset");
  const speedSlider=document.getElementById("live-speed");
  const speedLabel=document.getElementById("speed-label");

  speedSlider.oninput=()=>{
    state.liveState.speed=+speedSlider.value;
    speedLabel.textContent=`${state.liveState.speed} h/s`;
    if(state.liveState.playing){stopLive();startLive();}
  };

  function startLive(){
    state.liveState.playing=true;
    playBtn.style.display="none";
    pauseBtn.style.display="inline-block";
    const interval=Math.max(5,Math.round(1000/state.liveState.speed));
    state.liveState.timer=setInterval(()=>{
      if(state.liveState.handIdx>=hands.length-1){stopLive();return;}
      state.liveState.handIdx++;
      updateDisplay(state.liveState.handIdx);
    },interval);
  }

  playBtn.onclick=()=>startLive();
  pauseBtn.onclick=()=>stopLive();
  stepBtn.onclick=()=>{
    if(state.liveState.handIdx<hands.length-1){
      state.liveState.handIdx++;
      updateDisplay(state.liveState.handIdx);
    }
  };
  resetBtn.onclick=()=>{
    stopLive();
    state.liveState.handIdx=0;
    livePath.attr("d","");
    dot.attr("opacity",0);
    document.getElementById("player-cards").innerHTML="";
    document.getElementById("dealer-cards").innerHTML="";
    document.getElementById("player-total").textContent="";
    document.getElementById("dealer-total").textContent="";
    document.getElementById("hand-result-display").innerHTML="";
    document.getElementById("live-stats-grid").innerHTML="";
    document.getElementById("live-hand-counter").textContent=`Hand 0 / ${hands.length}`;
  };

  // Show first hand if we have one
  if(state.liveState.handIdx>0) updateDisplay(state.liveState.handIdx);
}

function stopLive(){
  state.liveState.playing=false;
  if(state.liveState.timer){clearInterval(state.liveState.timer);state.liveState.timer=null;}
  const playBtn=document.getElementById("live-play");
  const pauseBtn=document.getElementById("live-pause");
  if(playBtn) playBtn.style.display="inline-block";
  if(pauseBtn) pauseBtn.style.display="none";
}


// ══════════════════════════════════════════════════════════════════════════════
// SIDEBAR SETUP
// ══════════════════════════════════════════════════════════════════════════════

function buildSidebar(){
  const sc=document.getElementById("settings-container");
  const settings=[
    {key:"decks",label:"Decks",min:1,max:8,step:1,fmt:v=>v},
    {key:"penetration",label:"Penetration",min:50,max:95,step:5,fmt:v=>v+"%"},
    {key:"tableMin",label:"Table Min",min:5,max:100,step:5,fmt:v=>"$"+v},
    {key:"tableMax",label:"Table Max",min:500,max:25000,step:500,fmt:v=>v>=1000?"$"+(v/1000)+"k":"$"+v},
  ];
  for(const s of settings){
    const row=document.createElement("div");
    row.className="setting-row";
    row.innerHTML=`<div class="row-top"><span class="lbl">${s.label}</span><span class="val" id="val-${s.key}">${s.fmt(state.settings[s.key])}</span></div>
      <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${state.settings[s.key]}" id="slider-${s.key}">`;
    sc.appendChild(row);
    row.querySelector("input").oninput=e=>{
      state.settings[s.key]=+e.target.value;
      document.getElementById(`val-${s.key}`).textContent=s.fmt(state.settings[s.key]);
    };
  }
  // Toggles
  const toggles=[
    {key:"bjPays",label:"BJ Pays",options:["3:2","6:5"]},
    {key:"dealerS17",label:"Dealer S17",options:["Yes","No"],map:v=>v==="Yes"},
  ];
  for(const t of toggles){
    const row=document.createElement("div");
    row.className="toggle-row";
    const curVal=t.map?(!state.settings[t.key]?"No":"Yes"):state.settings[t.key];
    row.innerHTML=`<span class="lbl">${t.label}</span><div class="toggle-group">${
      t.options.map(o=>`<button class="toggle-opt${o===curVal?" active":""}" data-key="${t.key}" data-val="${o}">${o}</button>`).join("")
    }</div>`;
    sc.appendChild(row);
    row.querySelectorAll(".toggle-opt").forEach(btn=>{
      btn.onclick=()=>{
        const val=btn.dataset.val;
        state.settings[t.key]=t.map?t.map(val):val;
        row.querySelectorAll(".toggle-opt").forEach(b=>b.classList.toggle("active",b.dataset.val===val));
      };
    });
  }

  // Sim settings
  const ssc=document.getElementById("sim-settings-container");
  const simSettings=[
    {key:"bankroll",label:"Bankroll",min:500,max:100000,step:500,fmt:v=>v>=10000?"$"+(v/1000)+"k":"$"+v},
    {key:"hands",label:"Hands",min:100,max:50000,step:100,fmt:v=>v>=1000?(v/1000)+"k":v},
    {key:"sims",label:"Simulations",min:1,max:200,step:1,fmt:v=>v},
  ];
  for(const s of simSettings){
    const row=document.createElement("div");
    row.className="setting-row";
    row.innerHTML=`<div class="row-top"><span class="lbl">${s.label}</span><span class="val" id="val-${s.key}">${s.fmt(state.sim[s.key])}</span></div>
      <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${state.sim[s.key]}" id="slider-${s.key}">`;
    ssc.appendChild(row);
    row.querySelector("input").oninput=e=>{
      state.sim[s.key]=+e.target.value;
      document.getElementById(`val-${s.key}`).textContent=s.fmt(state.sim[s.key]);
    };
  }

  // ── Risk controls: stop-loss & take-profit ──
  // Both are optional. Each has a quick-pick ladder and a custom-value input
  // so the user can dial in something specific (e.g. -33% / +75%).
  const rcc=document.getElementById("risk-controls-container");
  const riskRows=[
    {
      key:"stopLossPct",
      label:"Stop Loss",
      hint:"end run if bankroll drops by this %",
      presets:[
        {val:null,label:"OFF"},
        {val:75, label:"-75%"},
        {val:50, label:"-50%"},
        {val:25, label:"-25%"},
        {val:10, label:"-10%"},
      ],
      color:"#ef5350",
    },
    {
      key:"takeProfitPct",
      label:"Take Profit",
      hint:"end run if bankroll grows by this %",
      presets:[
        {val:null,label:"OFF"},
        {val:25, label:"+25%"},
        {val:50, label:"+50%"},
        {val:100, label:"+100%"},
      ],
      color:"#66bb6a",
    },
  ];
  for(const r of riskRows){
    const wrap=document.createElement("div");
    wrap.className="setting-row";
    const cur=state.risk[r.key];
    wrap.innerHTML=`
      <div class="row-top">
        <span class="lbl" title="${r.hint}">${r.label}</span>
        <span class="val" id="val-${r.key}" style="color:${cur==null?"#666":r.color}">${cur==null?"OFF":(r.key==="stopLossPct"?"-":"+")+cur+"%"}</span>
      </div>
      <div class="toggle-group" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px" id="presets-${r.key}">
        ${r.presets.map(p=>`<button class="toggle-opt risk-preset${(cur===p.val||(p.val===null&&cur==null))?" active":""}" data-val="${p.val===null?"":p.val}">${p.label}</button>`).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
        <input type="number" min="1" max="500" step="1" placeholder="custom %"
          id="custom-${r.key}" value="${cur!=null && !r.presets.some(p=>p.val===cur) ? cur : ""}"
          style="flex:1;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);font:11px var(--font-mono);padding:5px 8px;border-radius:4px">
        <span style="font:11px var(--font-mono);color:#666">%</span>
      </div>
    `;
    rcc.appendChild(wrap);

    const valEl=wrap.querySelector(`#val-${r.key}`);
    const presetsEl=wrap.querySelector(`#presets-${r.key}`);
    const customEl=wrap.querySelector(`#custom-${r.key}`);

    function updateUI(){
      const cur=state.risk[r.key];
      valEl.textContent = cur==null ? "OFF" : (r.key==="stopLossPct"?"-":"+")+cur+"%";
      valEl.style.color = cur==null ? "#666" : r.color;
      presetsEl.querySelectorAll(".toggle-opt").forEach(b=>{
        const v=b.dataset.val===""?null:+b.dataset.val;
        b.classList.toggle("active", v===cur);
      });
    }
    presetsEl.querySelectorAll(".toggle-opt").forEach(btn=>{
      btn.onclick=()=>{
        const v=btn.dataset.val===""?null:+btn.dataset.val;
        state.risk[r.key]=v;
        if(v==null) customEl.value="";
        else customEl.value="";
        updateUI();
      };
    });
    customEl.oninput=e=>{
      const v=parseFloat(e.target.value);
      if(isNaN(v) || v<=0){ state.risk[r.key]=null; }
      else { state.risk[r.key]=v; }
      updateUI();
    };
  }

  // Strategies
  const stc=document.getElementById("strategies-container");
  for(const [key,meta] of Object.entries(STRATEGIES)){
    const btn=document.createElement("button");
    btn.className="strategy-btn"+(state.activeStrategies.has(key)?" active":"");
    btn.id=`strat-${key}`;
    btn.innerHTML=`<span class="dot" style="background:${state.activeStrategies.has(key)?meta.color:"#2a2d3a"}"></span><span class="label">${meta.name}</span><div class="desc">${meta.desc}</div>`;
    btn.onclick=()=>{
      if(state.activeStrategies.has(key)) state.activeStrategies.delete(key);
      else state.activeStrategies.add(key);
      btn.classList.toggle("active",state.activeStrategies.has(key));
      btn.querySelector(".dot").style.background=state.activeStrategies.has(key)?meta.color:"#2a2d3a";
    };
    stc.appendChild(btn);
  }
}

buildSidebar();
</script>
</body>
</html>
